<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lamar University Campus Map</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.0/dist/maplibre-gl.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;background:#111;}
    #map{position:absolute;inset:0;}

    /* ── Top bar ── */
    #topbar{
      position:absolute;top:0;left:0;right:0;z-index:200;
      background:linear-gradient(135deg,#C8102E 0%,#8B0000 100%);
      color:#fff;padding:10px 14px;display:flex;align-items:center;gap:10px;
      box-shadow:0 2px 12px rgba(0,0,0,.4);
    }
    #topbar .logo{font-size:24px;line-height:1;}
    #topbar .title h1{font-size:15px;font-weight:700;line-height:1.2;}
    #topbar .title p{font-size:11px;opacity:.8;margin-top:1px;}

    /* ── Search ── */
    #search-bar{position:absolute;top:66px;left:10px;right:10px;z-index:200;}
    #search-wrap{position:relative;}
    #search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
    #search-input{
      width:100%;padding:11px 14px 11px 40px;border-radius:12px;border:none;
      background:#fff;font-size:15px;box-shadow:0 3px 14px rgba(0,0,0,.25);outline:none;
    }
    #search-results{
      background:#fff;border-radius:12px;margin-top:5px;
      box-shadow:0 6px 20px rgba(0,0,0,.18);overflow:hidden;display:none;
    }
    .sri{
      padding:11px 14px;border-bottom:1px solid #f2f2f2;cursor:pointer;
      display:flex;align-items:center;gap:11px;
    }
    .sri:hover,.sri:active{background:#fdf0f0;}
    .sri:last-child{border-bottom:none;}
    .sri .bicon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
    .sri .bname{font-size:13px;font-weight:600;color:#1a1a1a;}
    .sri .btype{font-size:11px;color:#999;margin-top:2px;}

    /* ── Map controls ── */
    #map-controls{
      position:absolute;right:10px;top:50%;transform:translateY(-50%);
      z-index:200;display:flex;flex-direction:column;gap:8px;
    }
    .mctrl{
      width:42px;height:42px;background:#fff;border:none;border-radius:10px;
      font-size:18px;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.18);
      display:flex;align-items:center;justify-content:center;font-weight:600;color:#333;
      transition:background .15s;
    }
    .mctrl:active{background:#f0f0f0;}
    .mctrl.active-btn{background:#C8102E;color:#fff;}

    /* ── Layer pills ── */
    #pills{
      position:absolute;bottom:72px;left:10px;z-index:200;
      display:flex;gap:7px;flex-wrap:wrap;
    }
    .pill{
      background:#fff;border:none;border-radius:20px;
      padding:7px 13px;font-size:12px;font-weight:600;
      cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);color:#444;
      display:flex;align-items:center;gap:5px;transition:all .15s;
    }
    .pill.on{background:#C8102E;color:#fff;}

    /* ── Legend ── */
    #legend{
      position:absolute;bottom:120px;right:10px;z-index:200;
      background:#fff;border-radius:12px;padding:10px 12px;
      box-shadow:0 2px 10px rgba(0,0,0,.15);font-size:11px;min-width:120px;
    }
    #legend-toggle{font-weight:700;color:#333;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center;}
    #legend-body{margin-top:8px;}
    .li{display:flex;align-items:center;gap:7px;margin-bottom:4px;color:#555;}
    .ld{width:11px;height:11px;border-radius:3px;flex-shrink:0;}

    /* ── Bottom panel ── */
    #panel{

      background:#fff;border-radius:20px 20px 0 0;
      box-shadow:0 -4px 24px rgba(0,0,0,.18);

      transition:transform .3s cubic-bezier(.4,0,.2,1);
      max-height:68vh;overflow:hidden;display:flex;flex-direction:column;
    }

    #panel-drag{padding:8px 0 0;display:flex;flex-direction:column;align-items:center;cursor:pointer;flex-shrink:0;}
    #panel-drag .bar{width:38px;height:4px;background:#ddd;border-radius:2px;}
    #panel-drag .peek{height:40px;display:flex;align-items:center;padding:0 16px;width:100%;}
    #peek-label{font-size:14px;color:#888;font-style:italic;}
    #panel-scroll{overflow-y:auto;padding:0 16px 24px;flex:1;}

    #bi-name{font-size:19px;font-weight:700;color:#111;margin-bottom:3px;}
    #bi-meta{font-size:12px;color:#999;margin-bottom:14px;}
    #bi-actions{display:flex;gap:9px;margin-bottom:14px;}
    .ab{
      flex:1;padding:11px;border:none;border-radius:10px;
      font-size:13px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:5px;
    }
    .ab.pri{background:#C8102E;color:#fff;}
    .ab.sec{background:#f0f0f0;color:#333;}
    #bi-card{background:#fafafa;border-radius:10px;padding:12px;border:1px solid #eee;}
    #bi-desc{font-size:13px;color:#444;line-height:1.5;margin-bottom:8px;}
    #bi-hours{font-size:12px;color:#888;display:flex;align-items:flex-start;gap:6px;}

    /* Nav panel */
    #np-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    #np-back{background:none;border:none;font-size:20px;cursor:pointer;color:#666;padding:0;}
    #np-title{font-size:16px;font-weight:700;}
    #np-summary{
      background:linear-gradient(135deg,#C8102E,#8B0000);color:#fff;
      padding:13px 15px;border-radius:12px;margin-bottom:12px;
      display:flex;justify-content:space-between;align-items:center;
    }
    #np-time{font-size:24px;font-weight:700;}
    #np-dist{font-size:13px;opacity:.85;margin-top:2px;}
    .ep{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0;}
    .ep:last-of-type{border-bottom:none;margin-bottom:8px;}
    .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .dot.s{background:#4CAF50;}.dot.e{background:#C8102E;}
    .ep-lbl{font-size:13px;color:#333;}
    .step{display:flex;align-items:flex-start;gap:11px;padding:7px 0;border-bottom:1px solid #f8f8f8;}
    .step:last-child{border-bottom:none;}
    .si{font-size:19px;flex-shrink:0;margin-top:1px;}
    .st{font-size:13px;color:#444;line-height:1.4;}
    .sd{font-size:11px;color:#aaa;margin-top:2px;}

    /* Popup */
    .maplibregl-popup-content{border-radius:12px!important;padding:13px!important;box-shadow:0 4px 20px rgba(0,0,0,.22)!important;min-width:190px;}
    .pn{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:3px;}
    .pt{font-size:11px;color:#999;margin-bottom:9px;}
    .pa{display:flex;gap:7px;}
    .pb{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
    .pb.n{background:#C8102E;color:#fff;}.pb.i{background:#f0f0f0;color:#333;}

    /* Toast */
    #toast{
      position:absolute;top:120px;left:50%;transform:translateX(-50%);z-index:300;
      background:rgba(20,20,20,.85);color:#fff;padding:9px 18px;border-radius:20px;
      font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
      backdrop-filter:blur(4px);
    }
    #toast.show{opacity:1;}

    @media(min-width:700px){
      #panel{width:360px;left:10px;bottom:10px;right:auto;border-radius:16px;transform:translateY(0);max-height:62vh;}
      #panel.open{transform:translateY(0);}
      #panel-drag .peek{display:none;}
    }
  </style>

<script>
// ═══════════════════════════════════════════════════════
//  CAMPUS DATA — LAMAR UNIVERSITY, BEAUMONT TX
// ═══════════════════════════════════════════════════════

const TYPE_COLOR = {
  academic:'#C8102E', admin:'#8B0000', library:'#1565C0',
  recreation:'#2E7D32', student:'#E65100', housing:'#6A1B9A',
  engineering:'#BF360C', arts:'#AD1457', health:'#00838F', support:'#546E7A'
};
const TYPE_ICON = {
  academic:'📚', admin:'🏛️', library:'📖', recreation:'⚽',
  student:'🎓', housing:'🏠', engineering:'⚙️', arts:'🎨', health:'🏥', support:'🔧'
};

// BUILDING_INDEX is populated dynamically from LamarCampus.geojson after load
let BUILDING_INDEX = {};

function inferBuildingType(name, osmType) {
  if (osmType === 'dormitory' || osmType === 'residential') return 'housing';
  if (osmType === 'retail') return 'student';
  const n = (name || '').toLowerCase();
  if (/engineer|maes|technical|petroleum|process tech/.test(n)) return 'engineering';
  if (/library/.test(n)) return 'library';
  if (/art|music|theater|theatre|recital|dishman/.test(n)) return 'arts';
  if (/health|nursing|speech|hearing|recreational sports|athletic/.test(n)) return 'health';
  if (/plummer|admin|human resources|police|president/.test(n)) return 'admin';
  if (/setzer|student center/.test(n)) return 'student';
  if (/recreation|sports|montagne/.test(n)) return 'recreation';
  return 'academic';
}

function polygonCentroid(geometry) {
  const ring = geometry.type === 'Polygon'
    ? geometry.coordinates[0]
    : geometry.coordinates[0][0];
  const n = ring.length - 1;
  let lng = 0, lat = 0;
  for (let i = 0; i < n; i++) { lng += ring[i][0]; lat += ring[i][1]; }
  return [lng / n, lat / n];
}

function buildBuildingIndex(geojson) {
  BUILDING_INDEX = {};
  const labelFeatures = [];

  geojson.features.forEach(feat => {
    const props = feat.properties;
    const name = props.name;
    if (!name || !feat.geometry) return;
    const centroid = polygonCentroid(feat.geometry);
    const type = inferBuildingType(name, props.building);
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

    BUILDING_INDEX[id] = {
      id, name, type,
      abbr: id.split('-').map(w => w[0]).join('').toUpperCase().slice(0, 6),
      cx: centroid[0], cy: centroid[1],
      floors: props.levels ? +props.levels : (type === 'housing' ? 4 : 2),
      desc: `${name} on the Lamar University campus.`,
      hours: type === 'housing' ? 'Open 24 hours' : 'Mon–Fri  8:00 AM – 5:00 PM',
    };

    // Enrich feature properties for data-driven map styling
    props._id = id;
    props._type = type;
    feat.id = id;

    // Centroid point for label layer (avoids 3D-extrusion occlusion)
    labelFeatures.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: centroid },
      properties: { name, _id: id }
    });
  });

  console.log('Building index entries:', Object.keys(BUILDING_INDEX).length);
  return { type: 'FeatureCollection', features: labelFeatures };
}

// ═══════════════════════════════════════════════════════
//  ROUTING GRAPH FROM OSM PATHS (lamar_paths.geojson)
// ═══════════════════════════════════════════════════════
let PATHS_DATA = null;
let GRAPH = {};
let NODE_COORD = {};
let coordToNode = {};
let nodeIdCounter = 0;
const SNAP_DIST = 4.5; // meters
let highlightedBuildingId = null;

function getNodeId(coord) {
  const key = coord[0].toFixed(6)+','+coord[1].toFixed(6);
  if (!coordToNode[key]) {
    const id = 'n'+(nodeIdCounter++);
    coordToNode[key] = id;
    NODE_COORD[id] = coord.slice();
    GRAPH[id] = [];
  }
  return coordToNode[key];
}

function addEdge(a, b, d) {
  if (a === b) return;
  GRAPH[a] = GRAPH[a] || [];
  GRAPH[b] = GRAPH[b] || [];
  GRAPH[a].push({to: b, d});
  GRAPH[b].push({to: a, d});
}

function buildRoutingGraph(geojson) {
  PATHS_DATA = geojson;
  GRAPH = {};
  NODE_COORD = {};
  coordToNode = {};
  nodeIdCounter = 0;

  geojson.features.forEach(feature => {
    if (feature.geometry.type !== 'LineString') return;
    const coords = feature.geometry.coordinates;
    for (let i = 0; i < coords.length - 1; i++) {
      const a = coords[i];
      const b = coords[i + 1];
      const ida = getNodeId(a);
      const idb = getNodeId(b);
      addEdge(ida, idb, haversine(a, b));
    }
  });

  snapNodes();
  console.log('Routing graph nodes:', Object.keys(GRAPH).length);
}

function snapNodes() {
  const nodes = Object.entries(NODE_COORD);
  for (let i = 0; i < nodes.length; i++) {
    const [idA, coordA] = nodes[i];
    if (!GRAPH[idA]) continue;
    for (let j = i + 1; j < nodes.length; j++) {
      const [idB, coordB] = nodes[j];
      if (!GRAPH[idB]) continue;
      if (haversine(coordA, coordB) < SNAP_DIST) {
        mergeNodes(idA, idB);
      }
    }
  }
}

function mergeNodes(keepId, removeId) {
  if (keepId === removeId || !GRAPH[keepId] || !GRAPH[removeId]) return;
  GRAPH[keepId].push(...GRAPH[removeId]);
  delete GRAPH[removeId];
  delete NODE_COORD[removeId];

  for (const edges of Object.values(GRAPH)) {
    edges.forEach(edge => {
      if (edge.to === removeId) edge.to = keepId;
    });
  }

  const seen = new Set();
  GRAPH[keepId] = GRAPH[keepId].filter(edge => {
    if (edge.to === keepId) return false;
    const key = `${edge.to}@${Math.round(edge.d*100)}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function dijkstra(start, end) {
  const dist = {};
  const prev = {};
  const visited = new Set();
  Object.keys(GRAPH).forEach(k => dist[k] = Infinity);
  dist[start] = 0;

  while (true) {
    let u = null;
    let best = Infinity;
    for (const k in dist) {
      if (!visited.has(k) && dist[k] < best) {
        best = dist[k];
        u = k;
      }
    }
    if (!u || u === end) break;
    visited.add(u);

    GRAPH[u].forEach(({to, d}) => {
      const alt = dist[u] + d;
      if (alt < dist[to]) {
        dist[to] = alt;
        prev[to] = u;
      }
    });
  }

  const path = [];
  let cur = end;
  while (cur) {
    path.unshift(cur);
    cur = prev[cur];
  }
  return path[0] === start ? {path, totalDist: dist[end]} : null;
}

function nearestGraphNode(coord) {
  let best = null;
  let bestD = Infinity;
  for (const [id, c] of Object.entries(NODE_COORD)) {
    const d = haversine(coord, c);
    if (d < bestD) {
      bestD = d;
      best = id;
    }
  }
  return best;
}

// ═══════════════════════════════════════════════════════
//  OSM BUILDINGS DATA (Loaded from LamarCampus.geojson)
// ═══════════════════════════════════════════════════════


// ═══════════════════════════════════════════════════════
//  GEOMETRY HELPERS
// ═══════════════════════════════════════════════════════

function bldgPoly(cx, cy, wM, hM, rotDeg) {
  rotDeg = rotDeg || 0;
  const latOff = (hM/2) / 111000;
  const lngOff = (wM/2) / (111000 * Math.cos(cy * Math.PI/180));
  const r = rotDeg * Math.PI/180;
  const pts = [[-lngOff,-latOff],[lngOff,-latOff],[lngOff,latOff],[-lngOff,latOff]]
    .map(([dx,dy]) => [
      cx + dx*Math.cos(r) - dy*Math.sin(r),
      cy + dx*Math.sin(r) + dy*Math.cos(r)
    ]);
  return [[...pts, pts[0]]];
}

function haversine(a, b) {
  const R=6371000, φ1=a[1]*Math.PI/180, φ2=b[1]*Math.PI/180;
  const Δφ=(b[1]-a[1])*Math.PI/180, Δλ=(b[0]-a[0])*Math.PI/180;
  const x=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}

// ═══════════════════════════════════════════════════════
//  MAP INIT
// ═══════════════════════════════════════════════════════

const map = new maplibregl.Map({
  container:'map',
  style:'https://tiles.openfreemap.org/styles/liberty',
  center:[-94.0736, 30.0417],
  zoom:15.6, pitch:48, bearing:-8,
  maxZoom:20, minZoom:13,
  maxBounds:[[-94.0973, 30.0249],[-94.0523, 30.0599]]
});

map.addControl(new maplibregl.NavigationControl({showCompass:true}),'bottom-right');

// State
let is3D=true, labelsOn=true, legendOpen=true;
let selBuilding=null, navDest=null, userLoc=null;
let activePopup=null, userMarker=null;

map.on('load', async ()=>{

  // ── OSM Buildings (Loaded from GeoJSON file) ──
  const osmBuildingsRes = await fetch('LamarCampus.geojson');
  const osmBuildingsData = await osmBuildingsRes.json();
  const labelGeoJSON = buildBuildingIndex(osmBuildingsData); // populate BUILDING_INDEX + enrich props
  const pathsRes = await fetch('lamar_paths_1.geojson');
  const pathsData = await pathsRes.json();
  buildRoutingGraph(pathsData);
  map.addSource('osm-buildings',  { type:'geojson', data:osmBuildingsData });
  map.addSource('bldg-label-pts', { type:'geojson', data:labelGeoJSON });
  map.addSource('paths', { type:'geojson', data: pathsData });
  map.addSource('route', { type:'geojson', data:{type:'FeatureCollection',features:[]} });

  // ── Paths (from external GeoJSON) ──
  map.addLayer({ id:'paths', type:'line', source:'paths',
    layout:{'line-join':'round','line-cap':'round'},
    paint:{'line-color':'#FFD600','line-width':2.5,'line-opacity':0.72,'line-dasharray':[2,2]}
  });

  // ── OSM Buildings 3D extrusion (Real Data) ──
  map.addLayer({
    id:'osm-bldg-3d',
    type:'fill-extrusion',
    source:'osm-buildings',
    paint:{
      'fill-extrusion-color':['match',['get','_type'],
        'academic','#C8102E','admin','#8B0000','library','#1565C0',
        'recreation','#2E7D32','student','#E65100','housing','#6A1B9A',
        'engineering','#BF360C','arts','#AD1457','health','#00838F',
        '#546E7A'],
      'fill-extrusion-height':['coalesce',['*',['to-number',['get','levels']],4.5],12],
      'fill-extrusion-base':0,
      'fill-extrusion-opacity':0.9
    }
  });

  // ── OSM Building outlines ──
  map.addLayer({
    id:'osm-bldg-outline',
    type:'line',
    source:'osm-buildings',
    paint:{'line-color':'rgba(255,255,255,0.8)','line-width':1.4}
  });

  map.addLayer({
    id:'osm-bldg-highlight',
    type:'fill-extrusion',
    source:'osm-buildings',
    paint:{
      'fill-extrusion-color':'#FFD600',
      'fill-extrusion-opacity':0.22
    },
    filter:['==',['get','_id'],'']
  });

  // ── Navigation route ──
  map.addLayer({ id:'route-shadow', type:'line', source:'route',
    layout:{'line-join':'round','line-cap':'round'},
    paint:{'line-color':'rgba(0,0,0,0.25)','line-width':8,'line-blur':4}
  });
  map.addLayer({ id:'route', type:'line', source:'route',
    layout:{'line-join':'round','line-cap':'round'},
    paint:{'line-color':'#00C853','line-width':5,'line-opacity':0.95}
  });
  map.addLayer({ id:'route-dots', type:'circle', source:'route',
    filter:['==','$type','Point'],
    paint:{'circle-radius':8,'circle-color':'#00C853','circle-stroke-color':'#fff','circle-stroke-width':2}
  });

  // ── Building labels — added last so they render above all 3D layers ──
  map.addLayer({
    id:'osm-bldg-labels',
    type:'symbol',
    source:'bldg-label-pts',
    layout:{
      'text-field':['get','name'],
      'text-size':11,
      'text-anchor':'center',
      'text-max-width':8,
      'text-allow-overlap':true,
      'text-ignore-placement':true,
      'text-pitch-alignment':'viewport',
      'text-rotation-alignment':'viewport',
    },
    paint:{
      'text-color':'#ffffff',
      'text-halo-color':'rgba(0,0,0,0.75)',
      'text-halo-width':1.8
    }
  });

  map.moveLayer('osm-bldg-labels');

  // ── Interactions ──
  ['osm-bldg-3d'].forEach(l=>{
    map.on('click', l, onOSMBldgClick);
    map.on('mouseenter', l, ()=>map.getCanvas().style.cursor='pointer');
    map.on('mouseleave', l, ()=>map.getCanvas().style.cursor='');
  });
  map.on('click', e=>{
    const f=map.queryRenderedFeatures(e.point,{layers:['osm-bldg-3d']});
    if (!f.length) { if(activePopup){activePopup.remove();activePopup=null;} }
  });
});

// ── OSM Building click ──────────────────────────────────────
function onOSMBldgClick(e) {
  const props=e.features[0].properties;
  const id=props._id;
  if (id && BUILDING_INDEX[id]) {
    openBldgPanel(id);
    return;
  }
  // fallback for unnamed features
  const name=props.name||'Unknown Building';
  if (activePopup) activePopup.remove();
  activePopup=new maplibregl.Popup({offset:28,closeButton:false,maxWidth:'240px'})
    .setLngLat(e.lngLat)
    .setHTML(`
      <div class="pn">${name}</div>
      <div class="pt">${props.building||'Building'}</div>
      <div class="pa">
        <button class="pb i" onclick="closePopup()">✕ Close</button>
      </div>`)
    .addTo(map);
}

function closePopup() {
  if(activePopup){activePopup.remove();activePopup=null;}
}

// ═══════════════════════════════════════════════════════
//  PANELS
// ═══════════════════════════════════════════════════════

function openBldgPanel(id) {
  const b=BUILDING_INDEX[id];
  if (!b) return;
  highlightBuilding(id);
  selBuilding=b;
  _show('bi'); _hide('np');
  $('bi-name').textContent=b.name;
  $('bi-meta').textContent=`${b.abbr} · ${cap(b.type)} · ${b.floors} floors`;
  $('bi-desc').textContent=b.desc;
  $('bi-hours').innerHTML=`🕐 <span style="flex:1">${b.hours}</span>`;
  openPanel();
  map.flyTo({center:[b.cx,b.cy],zoom:17.5,pitch:55,duration:900});
}

function startNav() { if(selBuilding) navigateTo(selBuilding.id); }

function openPanel()  { $('panel').classList.add('open'); }
function closePanel() {
  $('panel').classList.remove('open');
  _hide('bi'); _hide('np');
  $('peek-label').textContent='Tap a building for details';
  selBuilding=null;
  highlightBuilding(null);
}
function togglePanel() { $('panel').classList.toggle('open'); }

function highlightBuilding(id) {
  if (!map.getLayer('osm-bldg-highlight')) return;
  if (highlightedBuildingId === id) return;
  highlightedBuildingId = id;
  if (id) {
    map.setFilter('osm-bldg-highlight', ['==',['get','_id'], id]);
  } else {
    map.setFilter('osm-bldg-highlight', ['==',['get','_id'], '']);
  }
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════

function navigateTo(destId) {
  if (activePopup){activePopup.remove();activePopup=null;}
  const dest=BUILDING_INDEX[destId];
  if (!dest) return;
  navDest=dest;

  const fromCoord = userLoc || [-94.0736, 30.0375];
  const fromLabel = userLoc ? 'Your Location' : 'University Dr Entrance';

  const startNode = nearestGraphNode(fromCoord);
  const endNode = nearestGraphNode([dest.cx, dest.cy]);
  const result = dijkstra(startNode, endNode);

  if (!result) { toast('Route not found'); return; }

  const pts = [fromCoord, ...result.path.map(id => NODE_COORD[id]), [dest.cx, dest.cy]];
  const totalM=pts.reduce((s,p,i)=>i>0?s+haversine(pts[i-1],p):0, 0);
  const mins=Math.max(1, Math.ceil(totalM/80));

  // Route line
  map.getSource('route').setData({
    type:'FeatureCollection',
    features:[{ type:'Feature', properties:{}, geometry:{type:'LineString', coordinates:pts} }]
  });

  // Update nav panel
  $('np-time').textContent=`${mins} min`;
  $('np-dist').textContent=`${totalM<1000?Math.round(totalM)+' m':(totalM/1000).toFixed(1)+' km'}  walk`;
  $('np-from').textContent=fromLabel;
  $('np-to').textContent=dest.name;
  $('np-steps').innerHTML=makeSteps(result.path, pts, dest.name);

  _hide('bi'); _show('np');
  openPanel();

  const bounds=pts.reduce((b,c)=>b.extend(c), new maplibregl.LngLatBounds(pts[0],pts[0]));
  map.fitBounds(bounds,{padding:{top:160,bottom:340,left:40,right:60},duration:1100});
}

function makeSteps(nodePath, coords, destName) {
  if (!nodePath.length) return '';
  const steps=[{icon:'🟢',text:'Start walking',dist:''}];
  for (let i=1;i<nodePath.length-1;i++) {
    const prev = NODE_COORD[nodePath[i-1]];
    const curr = NODE_COORD[nodePath[i]];
    const next = NODE_COORD[nodePath[i+1]];
    if (!prev||!curr||!next) continue;
    const b1 = Math.atan2(curr[0]-prev[0], curr[1]-prev[1]) * 180/Math.PI;
    const b2 = Math.atan2(next[0]-curr[0], next[1]-curr[1]) * 180/Math.PI;
    let turn = b2 - b1;
    if (turn > 180) turn -= 360;
    if (turn < -180) turn += 360;
    const d = Math.round(haversine(prev,curr));
    if (Math.abs(turn) > 25)
      steps.push({icon:turn>0?'↪️':'↩️',text:turn>0?'Turn right':'Turn left',dist:`After ${d} m`});
  }
  const last = coords[coords.length-2], dest = coords[coords.length-1];
  steps.push({icon:'🏁',text:`Arrive at ${destName}`,dist:`In ${Math.round(haversine(last,dest))} m`});
  return steps.map(s=>`
    <div class="step">
      <div class="si">${s.icon}</div>
      <div><div class="st">${s.text}</div><div class="sd">${s.dist}</div></div>
    </div>`).join('');
}

function closeNav() {
  _hide('np'); _hide('bi');
  $('panel').classList.remove('open');
  map.getSource('route').setData({type:'FeatureCollection',features:[]});
  navDest=null;
}

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════

const si=$('search-input'), sr=$('search-results');

si.addEventListener('input', e=>{
  const q=e.target.value.trim().toLowerCase();
  if (!q) { sr.style.display='none'; return; }
  const matches=Object.values(BUILDING_INDEX).filter(b=>
    b.name.toLowerCase().includes(q)||b.abbr.toLowerCase().includes(q)||
    b.type.toLowerCase().includes(q)||b.desc.toLowerCase().includes(q)
  ).slice(0,7);
  if (!matches.length) { sr.style.display='none'; return; }
  sr.innerHTML=matches.map(b=>`
    <div class="sri" onclick="selectResult('${b.id}')">
      <div class="bicon" style="background:${TYPE_COLOR[b.type]}22;color:${TYPE_COLOR[b.type]}">${TYPE_ICON[b.type]||'🏢'}</div>
      <div><div class="bname">${b.name}</div><div class="btype">${b.abbr} · ${cap(b.type)}</div></div>
    </div>`).join('');
  sr.style.display='block';
});

function selectResult(id) {
  sr.style.display='none'; si.value='';
  const b = BUILDING_INDEX[id];
  if (b) {
    highlightBuilding(id);
    openBldgPanel(id);
  }
}

map.on('click',()=>{ sr.style.display='none'; });
document.addEventListener('click',e=>{ if(!e.target.closest('#search-bar')) sr.style.display='none'; });

// ═══════════════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════════════

function toggle3D() {
  is3D=!is3D;
  map.setPitch(is3D?48:0);
  const btn=$('btn3d');
  btn.textContent=is3D?'3D':'2D';
  btn.classList.toggle('active-btn',is3D);
  toast(is3D?'3D View enabled':'2D Map view');
}

function toggleLayer(layerId, pillId) {
  const vis=map.getLayoutProperty(layerId,'visibility')||'visible';
  const next=vis==='visible'?'none':'visible';
  map.setLayoutProperty(layerId,'visibility',next);
  $(pillId).classList.toggle('on', next==='visible');
  toast(next==='visible'?'Paths shown':'Paths hidden');
}

function toggleLabels() {
  labelsOn=!labelsOn;
  map.setLayoutProperty('osm-bldg-labels','visibility',labelsOn?'visible':'none');
  $('pill-labels').classList.toggle('on',labelsOn);
  toast(labelsOn?'Labels shown':'Labels hidden');
}

function toggleLegend() {
  legendOpen=!legendOpen;
  $('legend-body').style.display=legendOpen?'block':'none';
  $('leg-arrow').textContent=legendOpen?'▲':'▼';
}

function locateMe() {
  if(!navigator.geolocation){toast('Geolocation not supported');return;}
  toast('Finding your location…');
  navigator.geolocation.getCurrentPosition(pos=>{
    userLoc=[pos.coords.longitude,pos.coords.latitude];
    if(userMarker) userMarker.remove();
    userMarker=new maplibregl.Marker({color:'#4CAF50'})
      .setLngLat(userLoc)
      .setPopup(new maplibregl.Popup().setHTML('<strong>📍 You are here</strong>'))
      .addTo(map);
    map.flyTo({center:userLoc,zoom:17,duration:900});
    toast('📍 Location found!');
  },()=>toast('Location unavailable — using campus entrance'));
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════

function $(id){return document.getElementById(id);}
function _show(id){$(id).style.display='block';}
function _hide(id){$(id).style.display='none';}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
let toastTimer;
function toast(msg){
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

// Expose for inline onclick handlers
window.navigateTo=navigateTo;
window.openBldgPanel=openBldgPanel;
</script>
